<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 电商平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">🛒 后台管理</a>
    <div class="nav-links">
        <a href="index.html">返回首页</a>
    </div>
    <div class="user-info" id="userInfo"></div>
</nav>

<div class="admin-layout">
    <!-- 侧边栏 -->
    <nav class="admin-sidebar" id="sidebar">
        <a href="#" class="active" data-page="products">商品管理</a>
        <a href="#" data-page="categories">分类管理</a>
        <a href="#" data-page="orders">订单管理</a>
        <a href="#" data-page="users">用户管理</a>
    </nav>

    <!-- 主内容区 -->
    <div class="admin-main" id="mainContent"></div>
</div>

<script>
let currentTab = 'products';

window.onload = function() {
    if (!isLoggedIn() || !isAdmin()) {
        document.body.innerHTML = '<div style="text-align:center;padding:100px;">' +
            '<h2 style="color:#f56c6c;">无权限访问</h2>' +
            '<p style="color:#999;margin:12px 0;">仅管理员可访问此页面</p>' +
            '<a href="login.html" class="btn btn-primary">去登录</a></div>';
        return;
    }
    document.getElementById('userInfo').innerHTML =
        '<span>👤 ' + getCurrentUser().username + '</span>' +
        '<a href="#" onclick="logout();return false">退出</a>';

    // 侧边栏切换
    document.getElementById('sidebar').addEventListener('click', function(e) {
        if (e.target.tagName === 'A' && e.target.dataset.page) {
            e.preventDefault();
            switchTab(e.target.dataset.page);
        }
    });

    switchTab('products');
};

function switchTab(tab) {
    currentTab = tab;
    // 高亮
    document.querySelectorAll('.admin-sidebar a').forEach(function(a) {
        a.classList.remove('active');
        if (a.dataset.page === tab) a.classList.add('active');
    });
    if (tab === 'products')   loadProductsTab();
    if (tab === 'categories') loadCategoriesTab();
    if (tab === 'orders')     loadOrdersTab();
    if (tab === 'users')      loadUsersTab();
}

// ==================== 商品管理 ====================
async function loadProductsTab() {
    const res = await productApi.list({ page: 1, size: 100 });
    if (!res || res.code !== 200) return;
    const products = res.data.records;

    let html = '<h3>商品管理</h3>' +
        '<button class="btn btn-primary" style="margin-bottom:16px;" onclick="showProductForm()">+ 新增商品</button>' +
        '<table><tr><th>ID</th><th>名称</th><th>价格</th><th>库存</th><th>状态</th><th>销量</th><th>操作</th></tr>';
    for (const p of products) {
        html += '<tr>' +
            '<td>' + p.id + '</td>' +
            '<td>' + p.name + '</td>' +
            '<td>¥' + p.price + '</td>' +
            '<td>' + p.stock + '</td>' +
            '<td>' + p.status + '</td>' +
            '<td>' + (p.salesCount || 0) + '</td>' +
            '<td>' +
                '<button class="btn btn-warning btn-small" onclick="editProduct(' + p.id + ')">编辑</button> ' +
                '<button class="btn btn-danger btn-small" onclick="deleteProduct(' + p.id + ')">删除</button>' +
            '</td>' +
        '</tr>';
    }
    html += '</table>';
    document.getElementById('mainContent').innerHTML = html;
}

function showProductForm(product) {
    const isEdit = !!product;
    const title = isEdit ? '编辑商品' : '新增商品';
    const data = product || {};

    document.getElementById('mainContent').innerHTML =
        '<h3>' + title + '</h3>' +
        '<div style="background:#fff;padding:24px;border-radius:8px;max-width:600px;">' +
            '<div class="form-group"><label>商品名称</label><input id="pName" value="' + (data.name || '') + '"></div>' +
            '<div class="form-group"><label>描述</label><textarea id="pDesc">' + (data.description || '') + '</textarea></div>' +
            '<div class="form-group"><label>价格</label><input id="pPrice" type="number" step="0.01" value="' + (data.price || '') + '"></div>' +
            '<div class="form-group"><label>库存</label><input id="pStock" type="number" value="' + (data.stock || 0) + '"></div>' +
            '<div class="form-group"><label>分类ID</label><input id="pCatId" type="number" value="' + (data.categoryId || '') + '"></div>' +
            '<div class="form-group"><label>图片URL</label><input id="pImage" value="' + (data.imageUrl || '') + '"></div>' +
            '<button class="btn btn-primary" onclick="saveProduct(' + (isEdit ? data.id : 'null') + ')">保存</button>' +
            '<button class="btn" style="margin-left:8px;" onclick="loadProductsTab()">取消</button>' +
        '</div>';
}

async function saveProduct(id) {
    const body = {
        name: document.getElementById('pName').value,
        description: document.getElementById('pDesc').value,
        price: parseFloat(document.getElementById('pPrice').value),
        stock: parseInt(document.getElementById('pStock').value),
        categoryId: parseInt(document.getElementById('pCatId').value) || null,
        imageUrl: document.getElementById('pImage').value
    };

    let res;
    if (id) {
        res = await productApi.update(id, body);
    } else {
        res = await productApi.create(body);
    }

    if (res && res.code === 200) {
        alert('保存成功');
        loadProductsTab();
    } else {
        alert(res ? res.message : '保存失败');
    }
}

function editProduct(id) {
    // 先加载商品详情
    productApi.detail(id).then(function(res) {
        if (res && res.code === 200) {
            showProductForm(res.data);
        }
    });
}

async function deleteProduct(id) {
    if (!confirm('确定删除该商品？')) return;
    const res = await productApi.delete(id);
    if (res && res.code === 200) {
        alert('删除成功');
        loadProductsTab();
    }
}

// ==================== 分类管理 ====================
async function loadCategoriesTab() {
    const res = await categoryApi.tree();
    if (!res || res.code !== 200) return;
    const categories = res.data;

    let html = '<h3>分类管理</h3>' +
        '<button class="btn btn-primary" style="margin-bottom:16px;" onclick="showCategoryForm()">+ 新增分类</button>' +
        '<table><tr><th>ID</th><th>名称</th><th>描述</th><th>父分类ID</th><th>操作</th></tr>';

    function render(list) {
        for (const c of list) {
            html += '<tr>' +
                '<td>' + c.id + '</td>' +
                '<td>' + c.name + '</td>' +
                '<td>' + (c.description || '') + '</td>' +
                '<td>' + (c.parentId || '顶级') + '</td>' +
                '<td>' +
                    '<button class="btn btn-danger btn-small" onclick="deleteCategory(' + c.id + ')">删除</button>' +
                '</td>' +
            '</tr>';
            if (c.children) render(c.children);
        }
    }
    render(categories);
    html += '</table>';
    document.getElementById('mainContent').innerHTML = html;
}

function showCategoryForm() {
    document.getElementById('mainContent').innerHTML =
        '<h3>新增分类</h3>' +
        '<div style="background:#fff;padding:24px;border-radius:8px;max-width:500px;">' +
            '<div class="form-group"><label>分类名称</label><input id="cName"></div>' +
            '<div class="form-group"><label>描述</label><input id="cDesc"></div>' +
            '<div class="form-group"><label>父分类ID（留空为顶级）</label><input id="cParentId" type="number"></div>' +
            '<button class="btn btn-primary" onclick="saveCategory()">保存</button>' +
            '<button class="btn" style="margin-left:8px;" onclick="loadCategoriesTab()">取消</button>' +
        '</div>';
}

async function saveCategory() {
    const body = {
        name: document.getElementById('cName').value,
        description: document.getElementById('cDesc').value,
        parentId: parseInt(document.getElementById('cParentId').value) || null
    };
    const res = await categoryApi.create(body);
    if (res && res.code === 200) {
        alert('创建成功');
        loadCategoriesTab();
    } else {
        alert(res ? res.message : '创建失败');
    }
}

async function deleteCategory(id) {
    if (!confirm('确定删除该分类？')) return;
    await categoryApi.delete(id);
    loadCategoriesTab();
}

// ==================== 订单管理 ====================
async function loadOrdersTab() {
    const res = await orderApi.allOrders(1, 50);
    if (!res || res.code !== 200) return;
    const orders = res.data.records;

    const statusMap = {
        'PENDING': '待支付', 'PAID': '已支付',
        'SHIPPED': '已发货', 'DELIVERED': '已签收', 'CANCELLED': '已取消'
    };

    let html = '<h3>订单管理</h3><table><tr>' +
        '<th>订单号</th><th>用户ID</th><th>金额</th><th>状态</th><th>收货人</th><th>时间</th><th>操作</th></tr>';
    for (const o of orders) {
        html += '<tr>' +
            '<td>' + o.orderNo + '</td>' +
            '<td>' + o.userId + '</td>' +
            '<td>¥' + o.totalAmount + '</td>' +
            '<td><span class="order-status status-' + o.status + '">' + (statusMap[o.status] || o.status) + '</span></td>' +
            '<td>' + o.shippingName + '</td>' +
            '<td>' + o.createdAt + '</td>' +
            '<td>' +
                (o.status === 'PENDING'
                    ? '<button class="btn btn-success btn-small" onclick="updateOrderStatus(' + o.id + ',\'PAID\')">设为已支付</button> '
                    : '') +
                (o.status === 'PAID'
                    ? '<button class="btn btn-warning btn-small" onclick="updateOrderStatus(' + o.id + ',\'SHIPPED\')">发货</button> '
                    : '') +
                (o.status === 'SHIPPED'
                    ? '<button class="btn btn-primary btn-small" onclick="updateOrderStatus(' + o.id + ',\'DELIVERED\')">标记签收</button> '
                    : '') +
            '</td>' +
        '</tr>';
    }
    html += '</table>';
    document.getElementById('mainContent').innerHTML = html;
}

async function updateOrderStatus(id, status) {
    const res = await orderApi.updateStatus(id, status);
    if (res && res.code === 200) {
        alert('状态更新成功');
        loadOrdersTab();
    } else {
        alert(res ? res.message : '更新失败');
    }
}

// ==================== 用户管理 ====================
async function loadUsersTab() {
    const res = await userApi.list();
    if (!res || res.code !== 200) return;
    const users = res.data;

    let html = '<h3>用户管理</h3><table><tr>' +
        '<th>ID</th><th>用户名</th><th>邮箱</th><th>手机</th><th>角色</th><th>注册时间</th><th>操作</th></tr>';
    for (const u of users) {
        html += '<tr>' +
            '<td>' + u.id + '</td>' +
            '<td>' + u.username + '</td>' +
            '<td>' + (u.email || '') + '</td>' +
            '<td>' + (u.phone || '') + '</td>' +
            '<td>' + u.role + '</td>' +
            '<td>' + u.createdAt + '</td>' +
            '<td>' +
                (u.role !== 'ADMIN'
                    ? '<button class="btn btn-danger btn-small" onclick="deleteUser(' + u.id + ')">删除</button>'
                    : '<span style="color:#999;">管理员</span>') +
            '</td>' +
        '</tr>';
    }
    html += '</table>';
    document.getElementById('mainContent').innerHTML = html;
}

async function deleteUser(id) {
    if (!confirm('确定删除该用户？')) return;
    await userApi.delete(id);
    loadUsersTab();
}
</script>
</body>
</html>
