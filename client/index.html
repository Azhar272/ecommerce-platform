<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商平台 - 首页</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
</head>
<body>

<!-- ==================== 顶部导航栏 ==================== -->
<nav class="navbar">
    <a href="index.html" class="logo">🛒 电商平台</a>
    <div class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="cart.html">购物车 <span class="badge" id="cartBadge" style="display:none">0</span></a>
        <a href="orders.html">我的订单</a>
        <span id="adminLink" style="display:none"><a href="admin.html">后台管理</a></span>
    </div>
    <div class="user-info" id="userInfo">
        <a href="login.html">登录</a>
        <a href="register.html">注册</a>
    </div>
</nav>

<!-- ==================== 主体内容 ==================== -->
<div class="container">
    <!-- 搜索栏 -->
    <div class="search-bar">
        <input type="text" id="keyword" placeholder="🔍 搜索商品名称..." onkeyup="if(event.key==='Enter')searchProducts()">
        <select id="categoryFilter" onchange="searchProducts()">
            <option value="">全部分类</option>
        </select>
        <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
    </div>

    <!-- 分类标签 -->
    <div class="category-tabs" id="categoryTabs">
        <button class="tab active" onclick="selectCategory(null, this)">全部</button>
    </div>

    <!-- 商品列表 -->
    <div class="product-grid" id="productGrid"></div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
</div>

<script>
// ==================== 全局状态 ====================
let currentPage = 1;
let currentCategoryId = null;
const pageSize = 8;

// ==================== 页面初始化 ====================
window.onload = function() {
    updateNavBar();      // 更新导航栏（登录状态）
    loadCategories();    // 加载分类
    loadProducts();      // 加载商品
};

/** 更新导航栏：显示用户信息或登录链接 */
function updateNavBar() {
    const user = getCurrentUser();
    const userInfo = document.getElementById('userInfo');
    if (user) {
        userInfo.innerHTML = `
            <span>👤 ${user.username}</span>
            <a href="#" onclick="logout();return false">退出</a>
        `;
        if (user.role === 'ADMIN') {
            document.getElementById('adminLink').style.display = 'inline';
        }
    }
}

/** 加载分类 */
async function loadCategories() {
    const res = await categoryApi.tree();
    if (!res || res.code !== 200) return;

    const categories = res.data;
    const filter = document.getElementById('categoryFilter');
    const tabs = document.getElementById('categoryTabs');

    // 填充下拉筛选框
    function addOptions(list, prefix) {
        if (!prefix) prefix = '';
        for (const c of list) {
            filter.innerHTML += '<option value="' + c.id + '">' + prefix + c.name + '</option>';
            if (c.children && c.children.length > 0) {
                addOptions(c.children, prefix + '── ');
            }
        }
    }
    addOptions(categories);

    // 生成分类标签
    for (const c of categories) {
        tabs.innerHTML += '<button class="tab" onclick="selectCategory(' + c.id + ', this)">' + c.name + '</button>';
    }
}

/** 选择分类 */
function selectCategory(catId, btn) {
    currentCategoryId = catId;
    currentPage = 1;
    // 高亮当前选中的标签
    document.querySelectorAll('.category-tabs .tab').forEach(function(t) { t.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    document.getElementById('categoryFilter').value = catId || '';
    loadProducts();
}

/** 搜索商品 */
function searchProducts() {
    currentPage = 1;
    loadProducts();
}

/** 加载商品列表 */
async function loadProducts() {
    const keyword = document.getElementById('keyword').value.trim();
    const params = { page: currentPage, size: pageSize };
    if (keyword) params.keyword = keyword;
    if (currentCategoryId) params.categoryId = currentCategoryId;

    const res = await productApi.list(params);
    if (!res || res.code !== 200) return;

    const pageData = res.data;
    renderProducts(pageData.records);
    renderPagination(pageData.total, pageData.page, pageData.size);
}

/** 渲染商品卡片 */
function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    if (!products || products.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">😕 暂无商品</p>';
        return;
    }
    grid.innerHTML = products.map(function(p) {
        return '<div class="product-card" onclick="location.href=\'product-detail.html?id=' + p.id + '\'">' +
            '<div class="img-box">' +
                (p.imageUrl
                    ? '<img src="' + p.imageUrl + '" alt="' + p.name + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'📦\'">'
                    : '📦') +
            '</div>' +
            '<div class="info">' +
                '<div class="name">' + p.name + '</div>' +
                '<div class="price">¥<span>' + p.price + '</span></div>' +
                '<div class="meta">' +
                    '<span>已售 ' + (p.salesCount || 0) + '</span>' +
                    '<span>库存 ' + p.stock + '</span>' +
                '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

/** 渲染分页 */
function renderPagination(total, page, size) {
    const totalPages = Math.ceil(total / size);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    let html = '<button ' + (page === 1 ? 'disabled' : '') + ' onclick="goPage(' + (page - 1) + ')">上一页</button>';
    for (let i = 1; i <= totalPages; i++) {
        html += '<button class="' + (i === page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    html += '<button ' + (page === totalPages ? 'disabled' : '') + ' onclick="goPage(' + (page + 1) + ')">下一页</button>';
    pag.innerHTML = html;
}

function goPage(p) {
    currentPage = p;
    loadProducts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
