<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 电商平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo">🛒 电商平台</a>
    <div class="nav-links">
        <a href="index.html">返回首页</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-box">
        <h2>用户注册</h2>
        <div class="form-group">
            <label>用户名 *</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码 *</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱（选填）">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" id="phone" placeholder="请输入手机号（选填）">
        </div>
        <div class="form-group">
            <label>收货地址</label>
            <input type="text" id="address" placeholder="请输入收货地址（选填）">
        </div>
        <button class="btn btn-primary" onclick="doRegister()">注 册</button>
        <div class="switch-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </div>
</div>

<script>
async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
        return showToast('用户名和密码不能为空', 'error');
    }

    const res = await userApi.register({
        username: username,
        password: password,
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim()
    });

    if (!res || res.code !== 200) {
        return showToast(res ? res.message : '注册失败', 'error');
    }

    showToast('注册成功！请登录', 'success');
    setTimeout(function() {
        location.href = 'login.html';
    }, 1000);
}

function showToast(msg, type) {
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2500);
}
</script>
</body>
</html>
